<svg width="720" height="150" viewBox="0 0 720 150" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- ХРОМ -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="12%" stop-color="#a8a8a8"/>
      <stop offset="25%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#9a9a9a"/>
      <stop offset="55%" stop-color="#f5f5f5"/>
      <stop offset="70%" stop-color="#8f8f8f"/>
      <stop offset="85%" stop-color="#e5e5e5"/>
      <stop offset="100%" stop-color="#4a4a4a"/>
    </linearGradient>

    <!-- БЛИК СВЕРХУ -->
    <linearGradient id="chromeTop" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="40%" stop-color="#ffffff" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.3"/>
    </linearGradient>

    <!-- МОЛНИЯ -->
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="30%" stop-color="#eaffc7"/>
      <stop offset="65%" stop-color="#b7ff2d"/>
      <stop offset="100%" stop-color="#6cff2b"/>
    </linearGradient>

    <!-- ТЕНЬ -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- СВЕЧЕНИЕ -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

  </defs>

  <!-- APEX -->
  <text x="60" y="75"
        font-size="56"
        font-weight="800"
        font-family="Arial, Helvetica, sans-serif"
        fill="url(#chrome)"
        filter="url(#shadow)">
    APEX
  </text>

  <!-- БЛИК -->
  <text x="60" y="75"
        font-size="56"
        font-weight="800"
        font-family="Arial, Helvetica, sans-serif"
        fill="url(#chromeTop)"
        opacity="0.5">
    APEX
  </text>

  <!-- VOLT -->
  <text x="400" y="75"
        font-size="56"
        font-weight="800"
        font-family="Arial, Helvetica, sans-serif"
        fill="url(#chrome)"
        filter="url(#shadow)">
    VOLT
  </text>

  <!-- БЛИК -->
  <text x="400" y="75"
        font-size="56"
        font-weight="800"
        font-family="Arial, Helvetica, sans-serif"
        fill="url(#chromeTop)"
        opacity="0.5">
    VOLT
  </text>

  <!-- ⚡ МОЛНИЯ -->
  <g transform="translate(290,10)" filter="url(#glow)">
    <path d="M30 0 L15 35 L30 35 L12 85 L60 30 L38 30 L52 0 Z"
          fill="url(#bolt)"/>
  </g>

  <!-- ЛИНИИ -->
  <line x1="60" y1="100" x2="250" y2="100" stroke="#8cff3f" stroke-opacity="0.4" stroke-width="1.4"/>
  <line x1="470" y1="100" x2="660" y2="100" stroke="#8cff3f" stroke-opacity="0.4" stroke-width="1.4"/>

  <!-- MOTORS (ПО ЦЕНТРУ) -->
  <text x="360" y="130"
        text-anchor="middle"
        font-size="20"
        letter-spacing="10"
        font-family="Arial, Helvetica, sans-serif"
        fill="#cfcfcf">
    MOTORS
  </text>

</svg>
