<svg width="600" height="120" viewBox="0 0 600 120" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#444"/>
      <stop offset="20%" stop-color="#aaa"/>
      <stop offset="40%" stop-color="#fff"/>
      <stop offset="60%" stop-color="#bbb"/>
      <stop offset="80%" stop-color="#eee"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>

    <linearGradient id="boltGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#b7ff2d"/>
      <stop offset="80%" stop-color="#7cff3a"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- APEX -->
  <text x="40" y="58"
        font-family="Arial, Helvetica, sans-serif"
        font-size="44"
        font-weight="800"
        fill="url(#chrome)">
    APEX
  </text>

  <!-- ⚡ (центрирован между словами) -->
  <polygon points="210,20 195,60 215,60 200,100 250,45 225,45 240,20"
           fill="url(#boltGrad)"
           filter="url(#glow)"/>

  <!-- VOLT -->
  <text x="280" y="58"
        font-family="Arial, Helvetica, sans-serif"
        font-size="44"
        font-weight="800"
        fill="url(#chrome)">
    VOLT
  </text>

  <!-- Линии -->
  <line x1="40" y1="80" x2="560" y2="80"
        stroke="rgba(255,255,255,0.1)" stroke-width="1"/>

  <!-- MOTORS -->
  <text x="300" y="105"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-size="14"
        letter-spacing="6"
        fill="#b7ff2d"
        filter="url(#glow)">
    MOTORS
  </text>

</svg>
