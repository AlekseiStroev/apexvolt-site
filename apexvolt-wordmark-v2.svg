<svg width="1000" height="220" viewBox="0 0 1000 220" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- ЯРКИЙ ХРОМ -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="20%" stop-color="#dcdcdc"/>
      <stop offset="35%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#9e9e9e"/>
      <stop offset="65%" stop-color="#ffffff"/>
      <stop offset="80%" stop-color="#cfcfcf"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>

    <!-- ГЛОУ -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="7"/>
    </filter>

    <!-- МОЛНИЯ -->
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#eaffc7"/>
      <stop offset="75%" stop-color="#b7ff2d"/>
      <stop offset="100%" stop-color="#6cff2b"/>
    </linearGradient>
  </defs>

  <!-- ЦЕНТР -->
  <g transform="translate(500,95)" text-anchor="middle">

    <!-- APEX -->
    <text x="-180" y="0"
          font-size="72"
          font-weight="900"
          font-family="Arial, Helvetica, sans-serif"
          fill="url(#chrome)">
      APEX
    </text>

    <!-- МОЛНИЯ (правильный размер) -->
    <g transform="translate(0,-55)" filter="url(#glow)">
      <path d="M0 0 L-12 38 L10 38 L-16 95 L42 38 L20 38 L34 0 Z"
            fill="url(#bolt)"/>
    </g>

    <!-- VOLT -->
    <text x="180" y="0"
          font-size="72"
          font-weight="900"
          font-family="Arial, Helvetica, sans-serif"
          fill="url(#chrome)">
      VOLT
    </text>

    <!-- ЛИНИИ -->
    <line x1="-360" y1="45" x2="-210" y2="45"
          stroke="#8cff3f" stroke-opacity="0.5" stroke-width="2"/>

    <line x1="210" y1="45" x2="360" y2="45"
          stroke="#8cff3f" stroke-opacity="0.5" stroke-width="2"/>

    <!-- MOTORS (ниже как на визитке) -->
    <text x="0" y="105"
          font-size="26"
          letter-spacing="12"
          font-family="Arial, Helvetica, sans-serif"
          fill="#dcdcdc">
      MOTORS
    </text>

  </g>

</svg>
