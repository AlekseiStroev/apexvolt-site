<svg width="720" height="150" viewBox="0 0 720 150" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- chrome -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3a3a3a"/>
      <stop offset="15%" stop-color="#cfcfcf"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#999"/>
      <stop offset="70%" stop-color="#f5f5f5"/>
      <stop offset="100%" stop-color="#444"/>
    </linearGradient>

    <!-- bolt -->
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#dfffaa"/>
      <stop offset="100%" stop-color="#7cff2d"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
    </filter>

  </defs>

  <!-- ГРУППА ЦЕНТРИРОВАНИЯ -->
  <g transform="translate(360,70)" text-anchor="middle">

    <!-- APEX -->
    <text x="-120" y="0"
          font-size="52"
          font-weight="800"
          font-family="Arial"
          fill="url(#chrome)">
      APEX
    </text>

    <!-- МОЛНИЯ -->
    <g transform="translate(0,-40)">
      <path d="M0 0 L-12 30 L5 30 L-10 75 L30 30 L12 30 L25 0 Z"
            fill="url(#bolt)"
            filter="url(#glow)"/>
    </g>

    <!-- VOLT -->
    <text x="120" y="0"
          font-size="52"
          font-weight="800"
          font-family="Arial"
          fill="url(#chrome)">
      VOLT
    </text>

    <!-- ЛИНИИ -->
    <line x1="-250" y1="25" x2="-140" y2="25"
          stroke="#8cff3f" stroke-opacity="0.5" stroke-width="1.5"/>

    <line x1="140" y1="25" x2="250" y2="25"
          stroke="#8cff3f" stroke-opacity="0.5" stroke-width="1.5"/>

    <!-- MOTORS -->
    <text x="0" y="55"
          font-size="18"
          letter-spacing="8"
          font-family="Arial"
          fill="#cfcfcf">
      MOTORS
    </text>

  </g>

</svg>
