<svg width="900" height="200" viewBox="0 0 900 200" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <!-- ХРОМ (более дорогой) -->
    <linearGradient id="chrome" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2a2a2a"/>
      <stop offset="15%" stop-color="#bfbfbf"/>
      <stop offset="30%" stop-color="#ffffff"/>
      <stop offset="50%" stop-color="#9a9a9a"/>
      <stop offset="70%" stop-color="#f2f2f2"/>
      <stop offset="85%" stop-color="#dcdcdc"/>
      <stop offset="100%" stop-color="#3a3a3a"/>
    </linearGradient>

    <!-- СВЕЧЕНИЕ -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- МОЛНИЯ -->
    <linearGradient id="bolt" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="40%" stop-color="#dfffaa"/>
      <stop offset="70%" stop-color="#b7ff2d"/>
      <stop offset="100%" stop-color="#6cff2b"/>
    </linearGradient>

  </defs>

  <!-- ГРУППА -->
  <g transform="translate(450,90)" text-anchor="middle">

    <!-- APEX -->
    <text x="-140" y="0"
          font-size="64"
          font-weight="800"
          font-family="Arial, Helvetica, sans-serif"
          fill="url(#chrome)">
      APEX
    </text>

    <!-- МОЛНИЯ (тоньше и аккуратнее) -->
    <g transform="translate(0,-48)" filter="url(#glow)">
      <path d="M0 0 L-10 32 L6 32 L-12 80 L36 30 L16 30 L28 0 Z"
            fill="url(#bolt)"/>
    </g>

    <!-- VOLT -->
    <text x="140" y="0"
          font-size="64"
          font-weight="800"
          font-family="Arial, Helvetica, sans-serif"
          fill="url(#chrome)">
      VOLT
    </text>

    <!-- ЛИНИИ (тонкие, как на визитке) -->
    <line x1="-300" y1="40" x2="-160" y2="40"
          stroke="#8cff3f" stroke-opacity="0.5" stroke-width="1.5"/>

    <line x1="160" y1="40" x2="300" y2="40"
          stroke="#8cff3f" stroke-opacity="0.5" stroke-width="1.5"/>

    <!-- MOTORS (идеально по центру) -->
    <text x="0" y="90"
          font-size="22"
          letter-spacing="10"
          font-family="Arial, Helvetica, sans-serif"
          fill="#cfcfcf">
      MOTORS
    </text>

  </g>

</svg>
