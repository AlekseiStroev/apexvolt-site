<!DOCTYPE html>
<html>

<head>
<meta charset="UTF-8">
<title>ApexVolt Motors</title>

<style>

body{
margin:0;
font-family:Arial;
background:#0a0a0a;
color:white;
text-align:center;
}

.hero{
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:40px 20px;

background:
linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.8)),
url("green-bike.png");

background-size:cover;
background-position:center;
}

.hero h1{
font-size:60px;
margin:0;
}

.hero p{
font-size:20px;
color:#ccc;
max-width:600px;
margin:20px auto;
}

.button{
display:inline-block;
padding:15px 28px;
background:#b7ff2d;
color:#111;
font-weight:bold;
border-radius:10px;
text-decoration:none;
margin-top:20px;
}

.bike{
padding:60px 20px;
}

.bike img{
width:90%;
max-width:900px;
border-radius:20px;
box-shadow:0 40px 80px rgba(0,0,0,.5);
}

.section{
padding:70px 20px;
background:#111;
}

input,textarea{
width:100%;
padding:15px;
border:none;
border-radius:8px;
margin-top:10px;
}

form{
max-width:600px;
margin:auto;
}

button{
margin-top:15px;
padding:15px 25px;
background:#b7ff2d;
border:none;
border-radius:8px;
font-weight:bold;
}

</style>
</head>

<body>

<section class="hero">

<div>

<h1>APEXVOLT MOTORS</h1>

<p>
Electric Off-Road Motorcycles  
for the next generation of riders.
</p>

<a class="button" href="#dealer">
Become a Dealer
</a>

</div>

</section>

<section class="bike">

<img src="green-bike.png">

</section>

<section class="section">

<h2 style="font-size:40px;color:#b7ff2d;">
Dealer Inquiry
</h2>

<p style="color:#aaa">
Interested in wholesale pricing or U.S. distribution?
</p>

<form action="mailto:apexvoltmotors@gmail.com" method="post">

<input placeholder="Your Name">

<input placeholder="Company">

<input placeholder="Email">

<textarea placeholder="Message"></textarea>

<button type="submit">
Send Inquiry
</button>

</form>

</section>

</body>
</html>
